<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeonGlass Hotel | Modern Dining & Booking</title>
    <meta name="description" content="Welcome to NeonGlass Hotel. A modern and stylish dining and booking experience. View our real-time menu and manage orders seamlessly." />
    <meta name="keywords" content="hotel, dining, restaurant, cafe, menu, order tracking, online booking, food" />
    <meta name="author" content="NeonGlass Hotel" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NeonGlass Hotel | Modern Dining" />
    <meta property="og:description" content="Experience modern dining with our real-time menu and seamless ordering service." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="NeonGlass Hotel | Modern Dining" />
    <meta property="twitter:description" content="Experience modern dining with our real-time menu and seamless ordering service." />

    <link rel="canonical" href="https://neonglasshotel.com" />

    <!-- Structured Data (JSON-LD) for LocalBusiness/Restaurant -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "image": [
        "https://neonglasshotel.com/cover.jpg"
      ],
      "name": "NeonGlass Hotel",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Neon Street",
        "addressLocality": "Cyber City",
        "addressRegion": "Metropolis",
        "postalCode": "10001",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 28.5355,
        "longitude": 77.3910
      },
      "url": "https://neonglasshotel.com",
      "telephone": "+919876543210",
      "servesCuisine": "Indian, Continental, Modern",
      "priceRange": "$$",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
            "Sunday"
          ],
          "opens": "10:00",
          "closes": "23:00"
        }
      ]
    }
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
